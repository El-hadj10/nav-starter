events {}

http {
  upstream api {
    server api:8000;
  }

  upstream frontend {
    server frontend:3000;
  }

  server {
    listen 80;
    server_name luma.shop;

    # Redirection HTTPS
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl http2;
    server_name luma.shop;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Frontend vitrine
    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # API backend
    location /api/ {
      rewrite ^/api/(.*) /$1 break;
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Webhooks (Stripe, etc.)
    location /webhooks/ {
      rewrite ^/webhooks/(.*) /webhooks/$1 break;
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
