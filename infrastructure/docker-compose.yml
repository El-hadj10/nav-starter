version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: luma_db
      POSTGRES_USER: luma
      POSTGRES_PASSWORD: luma
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schemas/init.sql:/docker-entrypoint-initdb.d/01_init.sql

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: ./api/.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./api:/app

  celery_worker:
    build:
      context: .
      dockerfile: infrastructure/docker/agents.Dockerfile
    command: celery -A agents.scheduler worker --loglevel=info
    restart: unless-stopped
    env_file: ./api/.env
    depends_on:
      - redis
      - postgres

  celery_beat:
    build:
      context: .
      dockerfile: infrastructure/docker/agents.Dockerfile
    command: celery -A agents.scheduler beat --loglevel=info
    restart: unless-stopped
    env_file: ./api/.env
    depends_on:
      - redis

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - api

volumes:
  postgres_data:
